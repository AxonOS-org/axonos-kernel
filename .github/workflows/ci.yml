name: AxonOS Kernel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly Kani + audit
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # ─── 1. Unit Tests (Stable) ──────────────────────────────────────────────
  test-stable:
    name: Test Stable (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets

  # ─── 2. macOS Host Tests ─────────────────────────────────────────────────
  test-macos:
    name: Test Stable (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets

  # ─── 3. Windows Host Tests ────────────────────────────────────────────────
  test-windows:
    name: Test Stable (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets

  # ─── 4. Clippy (Deny Warnings) ───────────────────────────────────────────
  clippy-deny:
    name: Clippy Deny Warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ─── 5. Format Check ─────────────────────────────────────────────────────
  fmt-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─── 6. no_std Build thumbv7em-none-eabihf (Cortex-M4F) ──────────────────
  no-std-thumbv7em:
    name: no_std Build (thumbv7em-none-eabihf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build --workspace --release --target thumbv7em-none-eabihf

  # ─── 7. no_std Build thumbv8m.main-none-eabihf (Cortex-M33) ───────────────
  no-std-thumbv8m:
    name: no_std Build (thumbv8m.main-none-eabihf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
      - run: cargo build --workspace --release --target thumbv8m.main-none-eabihf

  # ─── 8. Miri (unsafe check for axonos-spsc) ──────────────────────────────
  miri-spsc:
    name: Miri Check (axonos-spsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test -p axonos-spsc

  # ─── 9. Kani BMC — axonos-spsc ───────────────────────────────────────────
  kani-spsc:
    name: Kani BMC (axonos-spsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: axonos-spsc/kani-proofs
          args: "--default-unwind 8"

  # ─── 10. Kani BMC — axonos-scheduler ─────────────────────────────────────
  kani-scheduler:
    name: Kani BMC (axonos-scheduler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: axonos-scheduler/kani-proofs

  # ─── 11. Kani BMC — axonos-capability ────────────────────────────────────
  kani-capability:
    name: Kani BMC (axonos-capability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: axonos-capability/kani-proofs

          # ─── 12. Docs + Audit + MSRV ─────────────────────────────────────────────
  docs-audit-msrv:
    name: Docs, Audit & MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs
      - run: cargo doc --workspace --no-deps
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
      - uses: dtolnay/rust-toolchain@1.75.0
      - run: cargo check --workspace
