# cargo-deny configuration for AxonOS kernel workspace
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
# Targets we care about for build-graph analysis
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "thumbv7em-none-eabihf" },
    { triple = "thumbv8m.main-none-eabihf" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─── Advisories: security vulnerabilities ──────────────────────────────────
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on any vulnerability or unmaintained crate.
yanked = "deny"
ignore = []

# ─── Licenses: allowed licences for the dependency graph ───────────────────
[licenses]
version = 2
# AxonOS code is dual-licensed Apache-2.0 OR MIT. Dependencies must be
# compatible with both.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93

# ─── Bans: forbidden crates ─────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Add disallowed crates here as policy evolves.
]
skip = []
skip-tree = []

# ─── Sources: where dependencies may be fetched from ───────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
